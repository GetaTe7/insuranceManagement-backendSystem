openapi: 3.0.0
info:
  title: Insurance Management Backend API
  description: API documentation for the modular Insurance Management System.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter the JWT token generated from /auth/login or /auth/register.

  schemas:
    Policy:
      type: object
      properties:
        policyNumber:
          type: string
          example: POL-12345
        policyHolder:
          type: string
          description: User ID
        type:
          type: string
          example: Health
        premiumAmount:
          type: number
          example: 250.50
        coverageAmount:
          type: number
          example: 500000
        startDate:
          type: string
          format: date
          example: "2025-01-01"
        endDate:
          type: string
          format: date
          example: "2035-01-01"
        status:
          type: string
          enum: [active, inactive, expired]
          example: active

    Claim:
      type: object
      properties:
        claimNumber:
          type: string
          example: CLM-1771829
        policy:
          type: string
          description: Policy ID
        claimAmount:
          type: number
          example: 5000
        reason:
          type: string
          example: Medical emergency
        status:
          type: string
          enum: [pending, approved, rejected]
          example: pending

paths:
  /health:
    get:
      summary: Health Check
      description: Returns the health status of the API.
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: API is running
                  data:
                    type: object

  /auth/register:
    post:
      summary: Register User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: password123
                role:
                  type: string
                  enum: [customer, agent, admin]
                  example: customer
      responses:
        "201":
          description: User registered successfully
        "400":
          description: Bad request (validation failed)

  /auth/login:
    post:
      summary: Login User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: password123
      responses:
        "200":
          description: User logged in successfully

  /policies:
    get:
      summary: Get All Policies
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Policies retrieved successfully
    post:
      summary: Create Policy (Admin/Agent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Policy"
      responses:
        "201":
          description: Policy created successfully

  /claims:
    post:
      summary: File a new Claim
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy:
                  type: string
                  description: MongoDB Object ID of the policy
                claimAmount:
                  type: number
                  example: 1000
                reason:
                  type: string
                  example: Car accident damages
      responses:
        "201":
          description: Claim filed successfully
        "400":
          description: Bad request (e.g. claim exceeds coverage)

  /claims/{id}/status:
    patch:
      summary: Update Claim Status (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
                  example: approved
      responses:
        "200":
          description: Claim status updated successfully
